<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Humaniser Beast</title>
    <style>
        body, html { height: 100%; margin: 0; background: #0a0a0c; color: #fff; font-family: monospace; overflow: hidden; }
        .main-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        #output { height: 50%; width: 100%; background: #000; color: #00ff00; border: 2px solid #ffd700; border-radius: 10px; padding: 15px; overflow-y: auto; margin-bottom: 10px; box-sizing: border-box; }
        textarea { width: 100%; height: 20%; background: #1a1a1e; color: #fff; border: 2px solid #ffd700; padding: 10px; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; height: 10%; background: #ffd700; border: none; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="main-container">
    <div id="menu-icon" onclick="setKey()">⚙️ SETTINGS</div>
    <div id="output">Humaniser Beast Ready...</div>
    <textarea id="query" placeholder="Paste text to humanise..."></textarea>
    <button onclick="runHumaniser()">CONVERT TO HUMAN</button>
</div>

<script>
    let apiKey = localStorage.getItem('engineKey') || "";
    function setKey() {
        const key = prompt("Enter Groq API Key:", apiKey);
        if (key) { apiKey = key; localStorage.setItem('engineKey', key); }
    }

    async function runHumaniser() {
        const out = document.getElementById('output');
        const q = document.getElementById('query').value;
        
        if (!apiKey) { alert("API Key missing!"); return; }
        if (!q) { alert("Input text missing!"); return; }

        out.innerText = "Beast is working on your text...";

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: "You are a master humanizer. Rewrite the input text so it sounds 100% like a natural human. Remove all AI patterns. No preamble, just the humanized text." },
                        { role: "user", content: q }
                    ]
                })
            });
            const data = await res.json();
            
            if (data.choices && data.choices[0]) {
                out.innerText = data.choices[0].message.content;
            } else {
                out.innerText = "Error: " + JSON.stringify(data);
            }
        } catch (e) {
            out.innerText = "Beast Connection Error: " + e.message;
        }
    }
</script>
</body>
</html>
