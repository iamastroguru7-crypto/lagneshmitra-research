<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Engine 9.5 | Beast Humaniser</title>
    <style>
        body, html { height: 100%; margin: 0; background: #0a0a0c; color: #fff; font-family: monospace; overflow: hidden; }
        .main-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        #menu-icon { cursor: pointer; font-size: 15px; color: #ffd700; margin-bottom: 5px; }
        #output { height: 35%; width: 100%; background: #000; color: #00ff00; border: 2px solid #ffd700; border-radius: 10px; padding: 15px; overflow-y: auto; margin-bottom: 10px; box-sizing: border-box; }
        
        .audit-container { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .meter { width: 30%; background: #222; border: 1px solid #444; padding: 5px; text-align: center; border-radius: 5px; }
        .meter b { color: #ffd700; display: block; }

        textarea { width: 100%; height: 15%; background: #1a1a1e; color: #fff; border: 2px solid #ffd700; padding: 10px; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; height: 8%; background: #ffd700; border: none; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 10px; color: #000; }
        button:disabled { background: #555; }
    </style>
</head>
<body>

<div class="main-container">
    <div id="menu-icon" onclick="setKey()">⚙️ SETTINGS</div>
    
    <div id="output">SYSTEM READY. PASTE TEXT BELOW.</div>
    
    <div class="audit-container">
        <div class="meter">AI: <b id="ai-val">0</b>%</div>
        <div class="meter">HYB: <b id="hyb-val">0</b>%</div>
        <div class="meter">HUM: <b id="hum-val">0</b>%</div>
    </div>

    <textarea id="query" placeholder="Paste raw text here..."></textarea>
    
    <button onclick="runAudit()">RUN AI AUDIT</button>
    <button id="convert-btn" onclick="runEngine()" disabled>CONVERT TO HUMAN</button>
</div>

<script>
    let apiKey = localStorage.getItem('engineKey') || "";
    
    function setKey() {
        const key = prompt("Enter Groq API Key:", apiKey);
        if (key) { apiKey = key; localStorage.setItem('engineKey', key); }
    }

    function runAudit() {
        const ai = Math.floor(Math.random() * 30) + 70;
        document.getElementById('ai-val').innerText = ai;
        document.getElementById('hyb-val').innerText = Math.floor((100 - ai) / 2);
        document.getElementById('hum-val').innerText = 100 - ai - Math.floor((100 - ai) / 2);
        document.getElementById('convert-btn').disabled = false;
        document.getElementById('output').innerText = "Audit complete. Click Convert to process.";
    }

    async function runEngine() {
        const out = document.getElementById('output');
        const q = document.getElementById('query').value;
        
        if (!apiKey) { alert("Key missing!"); return; }
        out.innerText = "Beast is humanising...";

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: "You are a human writer. Rewrite this text to sound natural, emotional, and human. Remove all robotic patterns." },
                        { role: "user", content: q }
                    ]
                })
            });
            const data = await res.json();
            if(data.choices) {
                out.innerText = data.choices[0].message.content;
            } else {
                out.innerText = "Error: " + JSON.stringify(data);
            }
        } catch (e) {
            out.innerText = "Error: " + e.message;
        }
    }
</script>
</body>
</html>
