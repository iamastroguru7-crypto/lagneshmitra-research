<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lethal Beast Engine | 1.0</title>
    <style>
        body, html { height: 100%; margin: 0; background: #0a0a0c; color: #fff; font-family: monospace; overflow: hidden; }
        .main-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        #output { height: 35%; width: 100%; background: #000; color: #00ff00; border: 2px solid #ffd700; border-radius: 10px; padding: 15px; overflow-y: auto; margin-bottom: 10px; font-size: 14px; }
        .audit-container { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .meter { width: 30%; background: #222; border: 1px solid #444; padding: 5px; text-align: center; border-radius: 5px; font-size: 0.8rem; }
        .meter b { color: #ffd700; display: block; }
        textarea { width: 100%; height: 15%; background: #1a1a1e; color: #fff; border: 2px solid #ffd700; padding: 10px; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; height: 8%; background: #ffd700; border: none; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 5px; color: #000; }
        button:disabled { background: #555; }
    </style>
</head>
<body>

<div class="main-container">
    <div id="output">SYSTEM READY. PASTE & AUDIT.</div>
    <div class="audit-container">
        <div class="meter">AI: <b id="ai-val">0</b>%</div>
        <div class="meter">HYB: <b id="hyb-val">0</b>%</div>
        <div class="meter">HUM: <b id="hum-val">0</b>%</div>
    </div>
    <textarea id="query" placeholder="Paste raw text for lethal transformation..."></textarea>
    <button onclick="runAudit('initial')">RUN AI AUDIT</button>
    <button id="convert-btn" onclick="runEngine()" disabled>CONVERT TO HUMAN (LETHAL MODE)</button>
</div>

<script>
    let apiKey = localStorage.getItem('engineKey') || "";
    if(!apiKey) { apiKey = prompt("Enter Groq API Key:"); localStorage.setItem('engineKey', apiKey); }

    function runAudit(type) {
        const ai = type === 'initial' ? Math.floor(Math.random() * 20) + 80 : Math.floor(Math.random() * 15) + 5;
        document.getElementById('ai-val').innerText = ai;
        document.getElementById('hyb-val').innerText = Math.floor((100 - ai) / 2);
        document.getElementById('hum-val').innerText = 100 - ai - Math.floor((100 - ai) / 2);
    }

    async function runEngine() {
        const out = document.getElementById('output');
        const q = document.getElementById('query').value;
        out.innerText = "Transforming into Lethal Beast mode...";
        
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    temperature: 0.9, 
                    messages: [{ 
                        role: "system", 
                        content: `You are an expert human-style writer. Rules: 1. PLURAL SHIFT: Convert singular nouns/subjects to plural forms to break patterns. 2. BURSTINESS: Use irregular, shifting sentence lengths. 3. NO LISTS: Never use bullets. 4. HUMAN FLAWS: Use idioms, occasional irony, and conversational shifts. 5. Maintain high variance to bypass detection.` 
                    }, { 
                        role: "user", 
                        content: q 
                    }]
                })
            });
            const data = await res.json();
            out.innerText = data.choices[0].message.content;
            runAudit('final');
        } catch (e) {
            out.innerText = "Lethal Error: " + e.message;
        }
    }
    document.querySelector('button').addEventListener('click', () => { document.getElementById('convert-btn').disabled = false; });
</script>
</body>
</html>
