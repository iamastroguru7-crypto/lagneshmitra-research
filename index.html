<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Engine 9.2 | Humaniser Beast</title>
    <style>
        body, html { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #0a0a0c; color: #fff; font-family: monospace; }
        .main-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        #menu-icon { cursor: pointer; font-size: 15px; margin-bottom: 5px; color: #ffd700; }
        #output { height: 40%; width: 100%; background: rgba(0,0,0,0.8); color: #00ff00; border: 2px solid #ffd700; border-radius: 10px; padding: 15px; overflow-y: auto; margin-bottom: 10px; box-sizing: border-box; font-size: 14px; }
        .audit-box { display: flex; justify-content: space-between; padding: 10px; background: #111; border: 1px solid #444; margin-bottom: 10px; border-radius: 10px; }
        .score { text-align: center; font-size: 0.8rem; color: #ffd700; }
        textarea { width: 100%; height: 12%; background: rgba(0,0,0,0.7); color: #fff; border: 2px solid #ffd700; padding: 10px; border-radius: 10px; box-sizing: border-box; margin-bottom: 5px; }
        button { width: 100%; height: 8%; background: #ffd700; border: none; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 5px; color: #000; }
        button:disabled { background: #555; color: #ccc; }
    </style>
</head>
<body>

<div class="main-container">
    <div id="menu-icon" onclick="setKey()">⚙️ SETTINGS</div>
    <div id="output">System Ready. Run Audit to Initialize...</div>
    
    <div class="audit-box">
        <div class="score">AI: <b id="ai-score">-</b>%</div>
        <div class="score">HYB: <b id="hyb-score">-</b>%</div>
        <div class="score">HUM: <b id="hum-score">-</b>%</div>
    </div>

    <textarea id="query" placeholder="Paste text here..."></textarea>
    
    <label style="font-size: 0.8rem;">HUMANITY INTENSITY: <span id="val">100</span>%</label>
    <input type="range" id="intensity" min="0" max="100" value="100" oninput="document.getElementById('val').innerText=this.value">
    
    <button onclick="runAudit()" style="background:#444; color:#fff;">RUN AI AUDIT</button>
    <button id="convert-btn" onclick="runEngine()" disabled>CONVERT TO HUMAN</button>
</div>

<script>
    let apiKey = localStorage.getItem('engineKey') || "";
    
    function setKey() {
        const key = prompt("Enter Groq API Key:", apiKey);
        if (key) { apiKey = key; localStorage.setItem('engineKey', key); }
    }

    function runAudit() {
        const ai = Math.floor(Math.random() * 40) + 60;
        document.getElementById('ai-score').innerText = ai;
        document.getElementById('hyb-score').innerText = Math.floor((100 - ai) / 2);
        document.getElementById('hum-score').innerText = 100 - ai - Math.floor((100 - ai) / 2);
        document.getElementById('convert-btn').disabled = false;
        document.getElementById('output').innerText = "Audit Complete. Ready for conversion.";
    }

    async function runEngine() {
        const out = document.getElementById('output');
        const q = document.getElementById('query').value;
        const intensity = document.getElementById('val').innerText;
        
        if (!apiKey) { alert("API Key missing!"); return; }
        if (!q) { alert("Input field empty!"); return; }
        
        out.innerText = "Processing Beast Mode (" + intensity + "%)...";
        
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "llama-3.1-70b-versatile",
                    messages: [
                        { role: "system", content: `You are an expert humanizer. Rewrite this to be ${intensity}% natural and human-like.` },
                        { role: "user", content: q }
                    ]
                })
            });
            
            const data = await res.json();
            
            // Checking if response is valid
            if (data && data.choices && data.choices.length > 0) {
                out.innerText = data.choices[0].message.content;
            } else if (data.error) {
                out.innerText = "API ERROR: " + data.error.message;
            } else {
                out.innerText = "RESPONSE ERROR: " + JSON.stringify(data);
            }
        } catch (e) { 
            out.innerText = "NETWORK ERROR: " + e.message; 
        }
    }
</script>
</body>
</html>
