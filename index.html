<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Engine 9.6 | Full-Cycle Beast</title>
    <style>
        body, html { height: 100%; margin: 0; background: #0a0a0c; color: #fff; font-family: monospace; }
        .main-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        #output { height: 35%; width: 100%; background: #000; color: #00ff00; border: 2px solid #ffd700; border-radius: 10px; padding: 15px; overflow-y: auto; margin-bottom: 10px; }
        .audit-container { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .meter { width: 30%; background: #222; border: 1px solid #444; padding: 5px; text-align: center; border-radius: 5px; }
        .meter b { color: #ffd700; display: block; }
        textarea { width: 100%; height: 15%; background: #1a1a1e; color: #fff; border: 2px solid #ffd700; padding: 10px; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; height: 8%; background: #ffd700; border: none; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 5px; color: #000; }
    </style>
</head>
<body>

<div class="main-container">
    <div id="output">SYSTEM READY. PASTE & AUDIT.</div>
    <div class="audit-container">
        <div class="meter">AI: <b id="ai-val">0</b>%</div>
        <div class="meter">HYB: <b id="hyb-val">0</b>%</div>
        <div class="meter">HUM: <b id="hum-val">0</b>%</div>
    </div>
    <textarea id="query" placeholder="Paste raw text..."></textarea>
    <button onclick="runAudit('initial')">RUN AI AUDIT</button>
    <button id="convert-btn" onclick="runEngine()" disabled>CONVERT TO HUMAN</button>
</div>

<script>
    let apiKey = localStorage.getItem('engineKey') || "";
    if(!apiKey) apiKey = prompt("Enter API Key:"); localStorage.setItem('engineKey', apiKey);

    function runAudit(type) {
        // Simple random logic for demo, replace with actual AI detection if needed
        const ai = type === 'initial' ? Math.floor(Math.random() * 20) + 80 : Math.floor(Math.random() * 20) + 5;
        document.getElementById('ai-val').innerText = ai;
        document.getElementById('hyb-val').innerText = Math.floor((100 - ai) / 2);
        document.getElementById('hum-val').innerText = 100 - ai - Math.floor((100 - ai) / 2);
    }

    async function runEngine() {
        const out = document.getElementById('output');
        const q = document.getElementById('query').value;
        out.innerText = "Beast humanising...";
        
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "system", content: "Humanise this text to be 100% natural." }, { role: "user", content: q }]
                })
            });
            const data = await res.json();
            const humanisedText = data.choices[0].message.content;
            out.innerText = humanisedText;
            runAudit('final'); // Output aane ke baad naya audit run karo
        } catch (e) {
            out.innerText = "Error: " + e.message;
        }
    }
    // Enable convert button after first audit
    document.querySelector('button').addEventListener('click', () => { document.getElementById('convert-btn').disabled = false; });
</script>
</body>
</html>
