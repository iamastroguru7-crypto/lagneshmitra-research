<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Humaniser Core | LagneshMitra</title>
    <style>
        :root { --bg: #0a0a0c; --accent: #3b82f6; --text: #e5e7eb; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; border: 1px solid #333; padding: 30px; border-radius: 8px; }
        input, textarea, button { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a1e; border: 1px solid #444; color: white; box-sizing: border-box; }
        button { background: var(--accent); cursor: pointer; font-weight: bold; border: none; }
        button:disabled { background: #444; cursor: not-allowed; }
        #core-engine { display: none; }
        .stats { margin: 20px 0; }
        .analysis-box { display: flex; justify-content: space-around; padding: 15px; background: #111; border: 1px solid #333; margin: 15px 0; }
        .score-item { text-align: center; }
        .score-item b { display: block; font-size: 1.2em; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <h2>SYSTEM: HUMANISER ENGINE</h2>
    
    <div id="ignition-gate">
        <input type="password" id="api-key" placeholder="INSERT GROK API KEY">
        <button onclick="initSystem()">INITIALIZE ENGINE</button>
    </div>

    <div id="core-engine">
        <textarea id="raw-input" rows="8" placeholder="PASTE RAW TEXT..."></textarea>
        
        <button onclick="runAudit()" style="background:#222; border:1px solid #444; color:#aaa;">RUN AI AUDIT</button>
        
        <div class="analysis-box">
            <div class="score-item">AI: <b id="ai-score">-</b>%</div>
            <div class="score-item">HYBRID: <b id="hyb-score">-</b>%</div>
            <div class="score-item">HUMAN: <b id="hum-score">-</b>%</div>
        </div>
        
        <div class="stats">
            <label>HUMANITY INTENSITY: <span id="val">50</span>%</label>
            <input type="range" id="intensity" min="0" max="100" value="50" oninput="document.getElementById('val').innerText=this.value">
        </div>
        
        <button id="convert-btn" onclick="processHumanise()" disabled>CONVERT TO HUMAN</button>
        <div id="output-box" style="margin-top:20px; border: 1px solid #222; padding: 15px; background: #000; min-height: 50px;"></div>
    </div>
</div>

<script>
    let userApiKey = "";

    function initSystem() {
        userApiKey = document.getElementById('api-key').value;
        if (userApiKey.length > 10) {
            document.getElementById('ignition-gate').style.display = 'none';
            document.getElementById('core-engine').style.display = 'block';
        } else {
            alert("IGNITION FAILED: INVALID KEY");
        }
    }

    function runAudit() {
        const mockAI = Math.floor(Math.random() * 60) + 30;
        document.getElementById('ai-score').innerText = mockAI;
        document.getElementById('hyb-score').innerText = Math.floor((100 - mockAI) / 2);
        document.getElementById('hum-score').innerText = 100 - mockAI - Math.floor((100 - mockAI) / 2);
        
        document.getElementById('convert-btn').disabled = false;
    }

    async function processHumanise() {
        const text = document.getElementById('raw-input').value;
        const intensity = document.getElementById('intensity').value;
        const output = document.getElementById('output-box');
        
        output.innerText = "CONNECTING TO GROK CIRCUIT...";

        try {
            const response = await fetch('bridge.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ key: userApiKey, text: text, intensity: intensity })
            });
            
            const data = await response.json();
            output.innerText = data.result || "ERROR: NO RESPONSE FROM ENGINE";
        } catch (error) {
            output.innerText = "CRITICAL ERROR: BRIDGE CONNECTION FAILED.";
        }
    }
</script>
</body>
</html>
