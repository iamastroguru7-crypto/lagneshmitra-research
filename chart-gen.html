<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Financial Astrology Engine</title>
    <style>
        body { font-family: sans-serif; background: #1a202c; color: #fff; display: flex; justify-content: center; padding: 20px; }
        .container { background: #2d3748; padding: 25px; border-radius: 12px; width: 100%; max-width: 500px; }
        input, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 6px; border: none; }
        button { background: #48bb78; color: white; font-weight: bold; cursor: pointer; }
        #output { margin-top: 20px; padding: 15px; background: #4a5568; border-radius: 6px; word-wrap: break-word; }
    </style>
</head>
<body>
<div class="container">
    <h2>Financial Astrology</h2>
    <input type="date" id="dob" value="2000-01-01">
    <input type="time" id="tob" value="00:00">
    <input type="text" id="pob" value="London">
    <button onclick="generateInsight()">Generate Report</button>
    <div id="output">Result will appear here...</div>
</div>

<script>
async function generateInsight() {
    const output = document.getElementById('output');
    const dob = document.getElementById('dob').value.split('-').reverse().join('/');
    const tob = document.getElementById('tob').value;
    const loc = document.getElementById('pob').value;
    
    output.innerHTML = "Fetching data...";

    try {
        const response = await fetch(`/api/get-data?dob=${dob}&tob=${tob}&loc=${loc}`);
        const data = await response.json();
        
        // Pura data stringify karke dikha rahe hain taaki structure pata chale
        output.innerHTML = `<strong>Response:</strong><pre>${JSON.stringify(data, null, 2)}</pre>`;
    } catch(e) {
        output.innerHTML = `<span style="color:red">Error: ${e.message}</span>`;
    }
}
</script>
</body>
</html>
