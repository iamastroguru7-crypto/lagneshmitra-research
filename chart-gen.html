<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Financial Astrology Engine</title>
    <style>
        body { font-family: sans-serif; background: #1a202c; color: #fff; display: flex; justify-content: center; padding: 20px; }
        .container { background: #2d3748; padding: 25px; border-radius: 12px; width: 100%; max-width: 500px; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 6px; border: none; }
        button { background: #48bb78; color: white; font-weight: bold; cursor: pointer; }
        #output { margin-top: 20px; padding: 15px; background: #4a5568; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Financial Astrology</h2>
    <input type="date" id="dob">
    <input type="time" id="tob">
    <input type="text" id="pob" placeholder="City">
    <select id="chartType"><option value="D1">D1 Chart</option></select>
    <button onclick="generateInsight()">Generate Report</button>
    <div id="output">Waiting for data...</div>
</div>

<script>
async function generateInsight() {
    const output = document.getElementById('output');
    const dob = document.getElementById('dob').value;
    const tob = document.getElementById('tob').value;
    const pob = document.getElementById('pob').value; // Abhi ke liye static lat/lon use kar rahe hain
    
    // DEBUGGING START: Yeh dekhna ki inputs sahi ja rahe hain
    console.log("--- Debugging Started ---");
    console.log("Date:", dob, "Time:", tob, "Location:", pob);
    
    output.innerText = "Analyzing...";

    const apiKey = 'sk_live_0QU8V8YdAMv7v08zj1oST2kqk7Mi9Oxf19f54OiF';
    // VedAstro API URL (Lat/Lon abhi static Lucknow ka hai, baad mein update karenge)
    const url = `https://api.vedicastro.org/v1/Calculate/Chart?dob=${dob}&tob=${tob}&lat=26.8467&lon=80.9462&chart=D1&api_key=${apiKey}`;
    
    try {
        const res = await fetch(url);
        
        // DEBUGGING: Response status check
        console.log("Response Status:", res.status);
        
        const data = await res.json();
        
        // DEBUGGING: Full JSON response check
        console.log("Full API Response:", data);
        
        if (data.status === "Success") {
            output.innerHTML = `<strong>Data Received!</strong><br>Check Console for full details.`;
        } else {
            throw new Error(data.message || "API error");
        }
    } catch(e) {
        console.error("API Call Failed:", e);
        output.innerText = "Error: " + e.message + ". Check Console (F12) for details.";
    }
}
</script>


</body>
</html>
