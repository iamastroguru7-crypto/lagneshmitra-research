<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Financial Astrology Engine</title>
</head>
<body>
    <h2>Financial Astrology Engine</h2>
    <input type="date" id="dob" value="1981-11-08">
    <input type="time" id="tob" value="03:40">
    <input type="text" id="pob" value="Lucknow">
    <button onclick="generateInsight()">Generate Report</button>
    <div id="output">Result will appear here...</div>

    <script>
    async function generateInsight() {
        const output = document.getElementById('output');
        const dobRaw = document.getElementById('dob').value;
        const [y, m, d] = dobRaw.split('-');
        const dob = `${d}/${m}/${y}`;
        const tob = document.getElementById('tob').value;
        const loc = document.getElementById('pob').value;
        const apiKey = "sk_live_0QU8V8YdAMv7v08zj1oST2kqk7Mi9Oxf19f54OiF";
        
        // VedAstro URL
        const targetUrl = `https://api.vedastro.org/Calculate/PlanetName/Planet/Sun/Time/${tob}/${dob}/+05:30/Location/${loc}/India`;
        
        // Proxy URL
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl + '&api_key=' + apiKey)}`;
        
        output.innerHTML = "Fetching...";

        try {
            const response = await fetch(proxyUrl);
            const data = await response.json();
            // AllOrigins data ko 'contents' field mein deta hai
            const result = JSON.parse(data.contents);
            output.innerHTML = `<pre>${JSON.stringify(result, null, 2)}</pre>`;
        } catch(e) {
            output.innerHTML = `<span style="color:red">Error: ${e.message}. Yeh shayad CORS block hai.</span>`;
        }
    }
    </script>
</body>
</html>
