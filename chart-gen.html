<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Astrology Engine</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #0a0a0c; color: #fff; }
        input { padding: 10px; margin: 5px; color: #000; }
        button { padding: 10px 20px; cursor: pointer; background: #ffd700; border: none; font-weight: bold; }
        #output { margin-top: 20px; white-space: pre-wrap; background: #1a1a1a; padding: 15px; border: 1px solid #333; }
    </style>
</head>
<body>
    <h2>Financial Astrology Engine</h2>
    <input type="date" id="dob" value="1981-11-08">
    <input type="time" id="tob" value="03:40">
    <input type="text" id="pob" value="Lucknow">
    <button onclick="generateInsight()">Generate Report</button>
    <div id="output">Result will appear here...</div>

    <script>
    async function generateInsight() {
        const output = document.getElementById('output');
        const dobRaw = document.getElementById('dob').value; // YYYY-MM-DD
        const tob = document.getElementById('tob').value;
        const loc = document.getElementById('pob').value;
        
        // Date format: DD/MM/YYYY
        const [y, m, d] = dobRaw.split('-');
        const dob = `${d}/${m}/${y}`;
        
        output.innerHTML = "Fetching from server...";

        try {
            // Netlify Function call
            const response = await fetch(`/.netlify/functions/get-data?dob=${dob}&tob=${tob}&loc=${loc}`);
            
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            
            const data = await response.json();
            output.innerHTML = JSON.stringify(data, null, 2);
        } catch(e) {
            output.innerHTML = `<span style="color:red">Error: ${e.message}</span>`;
        }
    }
    </script>
</body>
</html>
