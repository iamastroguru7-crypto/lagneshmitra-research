<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Financial Astrology Engine</title>
    <style>
        body { font-family: sans-serif; background: #1a202c; color: #fff; display: flex; justify-content: center; padding: 20px; }
        .container { background: #2d3748; padding: 25px; border-radius: 12px; width: 100%; max-width: 500px; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 6px; border: none; }
        button { background: #48bb78; color: white; font-weight: bold; cursor: pointer; }
        #output { margin-top: 20px; padding: 15px; background: #4a5568; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Financial Astrology</h2>
    <input type="date" id="dob">
    <input type="time" id="tob">
    <input type="text" id="pob" placeholder="City">
    <select id="chartType"><option value="D1">D1 Chart</option></select>
    <button onclick="generateInsight()">Generate Report</button>
    <div id="output">Waiting for data...</div>
</div>

<script>
// VedAstro API Client (Vercel ready)
async function generateInsight() {
    const output = document.getElementById('output');
    output.innerText = "Analyzing financial stars...";
    
    // Yahan API Key aur logic client-side se fetch hoga
    const apiKey = 'sk_live_0QU8V8YdAMv7v08zj1oST2kqk7Mi9Oxf19f54OiF';
    const dob = document.getElementById('dob').value;
    const tob = document.getElementById('tob').value;
    
    // API Call
    const url = `https://api.vedicastro.org/v1/Calculate/Chart?dob=${dob}&tob=${tob}&lat=26.8467&lon=80.9462&chart=D1&api_key=${apiKey}`;
    
    try {
        const res = await fetch(url);
        const data = await res.json();
        
        // Insight Logic (Papa ke liye simple output)
        const jupiterHouse = data.data.planets.jupiter.house; // Example logic
        let message = (jupiterHouse === 2 || jupiterHouse === 11) 
            ? "Strong wealth potential indicated by Jupiter placement." 
            : "Focus on steady income and savings.";
            
        output.innerHTML = `<strong>Financial Verdict:</strong><br>${message}`;
    } catch(e) {
        output.innerText = "Error loading data. Check API Key or Input.";
    }
}
</script>

</body>
</html>
