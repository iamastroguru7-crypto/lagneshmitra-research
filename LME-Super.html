<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Phoenix Engine 9.0</title>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            height: 100%; margin: 0; padding: 0; overflow: hidden; 
            background: #000; font-family: 'Courier New', Courier, monospace; 
        }
        
        .main-container { 
            display: flex; flex-direction: column; 
            height: 100vh; padding: 10px;
        }

        #menu-icon { color: #ffd700; cursor: pointer; font-size: 18px; margin-bottom: 8px; flex-shrink: 0; }

        /* Output Box - Fixed for perfect scrolling */
        #output { 
            flex: 1; 
            min-height: 0; 
            background: rgba(0,0,0,0.85);
            color: #00ff00; border: 2px solid #ffd700; border-radius: 10px; 
            padding: 15px; overflow-y: auto; margin-bottom: 10px;
            line-height: 1.4; font-size: 14px;
        }

        /* Input Section - Fixed Height */
        .input-wrapper { 
            flex-shrink: 0; height: 70px; display: flex; gap: 8px;
        }
        
        textarea { 
            flex: 1; background: rgba(0,0,0,0.7); color: #fff; 
            border: 2px solid #ffd700; padding: 10px; border-radius: 10px; 
            font-size: 14px; resize: none;
        }
        
        .btn-group { display: flex; flex-direction: column; gap: 5px; }
        .btn { width: 50px; height: 32px; background: #ffd700; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; color: #000; font-size: 14px; }
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="main-container">
    <div id="menu-icon" onclick="setKey()">⚙️ CONFIG</div>
    <div id="output">System Ready. Awaiting data...</div>
    
    <div class="input-wrapper">
        <textarea id="query" placeholder="Enter Analysis Query..."></textarea>
        <div class="btn-group">
            <button class="btn" onclick="document.getElementById('fileInput').click()">📎</button>
            <input type="file" id="fileInput" accept="image/*" onchange="handleImage()">
            <button class="btn" onclick="runEngine()">GO</button>
        </div>
    </div>
</div>

<script>
    let apiKey = localStorage.getItem('engineKey') || "";
    let chatHistory = [{ role: "system", content: "You are a precision Astrological Data Engine. First, extract Name, DOB, TOB, and POB. Confirm data clearly. Then provide ruthless analysis. No fluff." }];

    function setKey() {
        const key = prompt("Enter API Key:", apiKey);
        if (key) { apiKey = key; localStorage.setItem('engineKey', key); }
    }

    function handleImage() {
        const file = document.getElementById('fileInput').files[0];
        if (file) {
            document.getElementById('output').innerHTML += `<div style="color:yellow; padding: 5px 0;">📎 Image selected: ${file.name}</div>`;
            document.getElementById('output').scrollTop = document.getElementById('output').scrollHeight;
        }
    }

    async function runEngine() {
        const out = document.getElementById('output');
        const qField = document.getElementById('query');
        const q = qField.value.trim();

        if (!q) return;
        if (!apiKey) { alert("API Key missing!"); return; }

        chatHistory.push({ role: "user", content: q });
        renderHistory();
        qField.value = ""; 

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: chatHistory })
            });
            const data = await res.json();
            const responseText = data.choices[0].message.content;
            
            chatHistory.push({ role: "assistant", content: responseText });
            renderHistory();
        } catch (e) {
            out.innerHTML += `<div style="color:red; padding: 5px 0;">Error: ${e.message}</div>`;
        }
    }

    function renderHistory() {
        const out = document.getElementById('output');
        out.innerHTML = chatHistory.filter(m => m.role !== 'system').map(m => 
            `<div style="margin-bottom: 15px;">
                <strong>${m.role === 'user' ? 'YOU:' : 'PHOENIX:'}</strong><br>${m.content}
             </div>`
        ).join('<hr style="border:0.1px solid #ffd700;">');
        out.scrollTop = out.scrollHeight;
    }
</script>
</body>
</html>
